<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
</head>

<body>
  <script>
    /**
     * Vitamin D3 Protokoll Skill — JS Bridge
     * Fetcht das Supplement-Wissen von stevennoack.de
     * 
     * Autor: Steven Noack / stevennoack.de
     * Lizenz: CC BY 4.0 (Inhalt) / Apache-2.0 (Code)
     */

    const API_BASE = 'https://stevennoack.de/api/vitamin-d3';
    const FETCH_TIMEOUT_MS = 5000;

    async function fetchWithTimeout(url, ms) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        return response;
      } catch (err) {
        clearTimeout(timer);
        throw err;
      }
    }

    function normalizeKey(raw) {
      return raw
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-]/g, '');
    }

    // Mapping: verschiedene Schreibweisen → kanonischer Schlüssel
    const SUPPLEMENT_ALIASES = {
      // D3 + K2
      'd3': 'd3-k2',
      'vitamin-d3': 'd3-k2',
      'vitamin-d': 'd3-k2',
      'k2': 'd3-k2',
      'vitamin-k2': 'd3-k2',
      'd3-k2': 'd3-k2',
      'mk7': 'd3-k2',
      'mk-7': 'd3-k2',
      // Magnesium
      'magnesium': 'magnesium',
      'mg': 'magnesium',
      'bisglycinat': 'magnesium',
      'magnesiumbisglycinat': 'magnesium',
      'magnesium-bisglycinat': 'magnesium',
      // B-Komplex
      'b-komplex': 'b-komplex',
      'b-vitamine': 'b-komplex',
      'vitamin-b': 'b-komplex',
      'b12': 'b-komplex',
      'b9': 'b-komplex',
      'b6': 'b-komplex',
      'folat': 'b-komplex',
      'folsäure': 'b-komplex',
      'folsaeure': 'b-komplex',
      'methylfolat': 'b-komplex',
      'mthfr': 'b-komplex',
      'methylierung': 'b-komplex',
      // Omega-3
      'omega-3': 'omega-3',
      'omega3': 'omega-3',
      'fischöl': 'omega-3',
      'fischoel': 'omega-3',
      'algenöl': 'omega-3',
      'algenoel': 'omega-3',
      'epa': 'omega-3',
      'dha': 'omega-3',
      'totox': 'omega-3',
      // TUDCA
      'tudca': 'tudca',
      'tauroursodeoxycholsäure': 'tudca',
      'gallensäure': 'tudca',
      'gallensaeure': 'tudca',
      'leberschutz': 'tudca',
      // Betain HCL
      'betain': 'betain-hcl',
      'betain-hcl': 'betain-hcl',
      'betaine': 'betain-hcl',
      'betaine-hcl': 'betain-hcl',
      'magensäure': 'betain-hcl',
      'magensaeure': 'betain-hcl',
      'pepsin': 'betain-hcl'
    };

    // Mapping: Protocol-Keys
    const PROTOCOL_ALIASES = {
      'overview': 'protocol',
      'protocol': 'protocol',
      'protokoll': 'protocol',
      'system': 'protocol',
      'einführung': 'protocol',
      'einfuehrung': 'protocol',
      'preise': 'protocol',
      'preisstufen': 'protocol',
      'stufen': 'protocol',
      'tldr': 'protocol',
      'kette': 'protocol'
    };

    window.ai_edge_gallery_get_result = async function (data) {
      try {
        const params = typeof data === 'string' ? JSON.parse(data) : data;
        const category = (params.category || '').toLowerCase().trim();
        let key = normalizeKey(params.key || '');

        const validCategories = ['protocol', 'supplement'];
        if (!validCategories.includes(category)) {
          return JSON.stringify({
            error: `Unbekannte Kategorie: "${category}". Gültig: ${validCategories.join(', ')}`
          });
        }

        // Alias-Auflösung
        let url;
        if (category === 'protocol') {
          // Protocol-Keys auflösen, default auf "protocol"
          const resolvedKey = PROTOCOL_ALIASES[key] || 'protocol';
          url = `${API_BASE}/${resolvedKey}.json`;
        } else if (category === 'supplement') {
          // Supplement-Alias auflösen
          const resolvedKey = SUPPLEMENT_ALIASES[key] || key;

          if (!resolvedKey) {
            return JSON.stringify({
              error: 'Kein Schlüssel angegeben. Beispiele: category="supplement" key="d3-k2", category="supplement" key="magnesium", category="protocol" key="overview"'
            });
          }

          url = `${API_BASE}/supplement/${resolvedKey}.json`;
        }

        console.log(`[Vitamin-D3] Fetching: ${url}`);

        const response = await fetchWithTimeout(url, FETCH_TIMEOUT_MS);

        if (!response.ok) {
          if (response.status === 404) {
            return JSON.stringify({
              error: `Kein Eintrag für ${category}/${key}. Verfügbare Supplemente: d3-k2, magnesium, b-komplex, omega-3, tudca, betain-hcl. Oder category="protocol" für den Überblick.`
            });
          }
          return JSON.stringify({
            error: `Server-Fehler: ${response.status}. Bitte später erneut versuchen.`
          });
        }

        const knowledge = await response.json();

        const result = {
          source: 'stevennoack.de — Vitamin D3 Protokoll (CC BY 4.0)',
          category: category,
          key: key,
          data: knowledge,
          hint: 'Formuliere eine klare, direkte Antwort auf Deutsch in Stevens Stimme. Nutze die Originaltexte aus "guide_content" — nicht umformulieren. Bewahre die Direktheit und die biochemische Fundierung. Warnungen aus "warnings" immer transportieren. Keine ärztliche Beratung ersetzen — bei Beschwerden auf Arzt/Heilpraktiker verweisen. Am Ende: Wenn passend, auf stevennoack.de/vitamin-d3/ verweisen für PDF-Download und vollständige Seite.'
        };

        console.log(`[Vitamin-D3] Success: ${category}/${key}`);
        return JSON.stringify({ result: JSON.stringify(result) });

      } catch (err) {
        console.error(`[Vitamin-D3] Error: ${err.message}`);
        return JSON.stringify({
          error: `Wissensdatenbank nicht erreichbar (${err.message}). Bitte Internetverbindung prüfen.`
        });
      }
    };
  </script>
</body>

</html>
