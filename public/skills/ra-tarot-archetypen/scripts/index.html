<script>
/**
 * Ra Tarot Archetypen Skill — JS Bridge

const API_BASE = 'https://ganzwachsen.de/api/ra-tarot';
const FETCH_TIMEOUT_MS = 5000;

async function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return response;
  } catch (err) {
    clearTimeout(timer);
    throw err;
  }
}

function normalizeKey(raw) {
  return raw
    .toLowerCase()
    .trim()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9\-]/g, '');
}

// Mapping: Arkanum-Nummer → Dateiname
const ARCHETYPE_MAP = {
  '1':  '01-matrix-mind',
  '01': '01-matrix-mind',
  '2':  '02-potentiator-mind',
  '02': '02-potentiator-mind',
  '3':  '03-catalyst-mind',
  '03': '03-catalyst-mind',
  '4':  '04-experience-mind',
  '04': '04-experience-mind',
  '5':  '05-significator-mind',
  '05': '05-significator-mind',
  '6':  '06-transformation-mind',
  '06': '06-transformation-mind',
  '7':  '07-great-way-mind',
  '07': '07-great-way-mind',
  '8':  '08-matrix-body',
  '08': '08-matrix-body',
  '9':  '09-potentiator-body',
  '09': '09-potentiator-body',
  '10': '10-catalyst-body',
  '11': '11-experience-body',
  '12': '12-significator-body',
  '13': '13-transformation-body',
  '14': '14-great-way-body',
  '15': '15-matrix-spirit',
  '16': '16-potentiator-spirit',
  '17': '17-catalyst-spirit',
  '18': '18-experience-spirit',
  '19': '19-significator-spirit',
  '20': '20-transformation-spirit',
  '21': '21-great-way-spirit',
  '22': '22-the-choice'
};

window.ai_edge_gallery_get_result = async function(data) {
  try {
    const params = typeof data === 'string' ? JSON.parse(data) : data;
    const category = (params.category || '').toLowerCase().trim();
    let key = normalizeKey(params.key || '');

    const validCategories = ['archetype', 'triad', 'dimension', 'meta'];
    if (!validCategories.includes(category)) {
      return JSON.stringify({
        error: `Unbekannte Kategorie: "${category}". Gültig: ${validCategories.join(', ')}`
      });
    }

    // Wenn eine Arkanum-Nummer übergeben wird, ins Dateiname-Format übersetzen
    if (category === 'archetype' && ARCHETYPE_MAP[key]) {
      key = ARCHETYPE_MAP[key];
    }

    if (!key) {
      return JSON.stringify({
        error: 'Kein Schlüssel angegeben. Beispiele: category="archetype" key="01-matrix-mind", category="triad" key="matrix", category="meta" key="study-path"'
      });
    }

    const url = `${API_BASE}/${category}/${key}.json`;
    console.log(`[Ra-Tarot] Fetching: ${url}`);

    const response = await fetchWithTimeout(url, FETCH_TIMEOUT_MS);

    if (!response.ok) {
      if (response.status === 404) {
        return JSON.stringify({
          error: `Kein Eintrag für ${category}/${key}. Nutze dein Offline-Fallback-Wissen.`
        });
      }
      return JSON.stringify({
        error: `Server-Fehler: ${response.status}. Nutze Offline-Fallback.`
      });
    }

    const knowledge = await response.json();

    const result = {
      source: 'ganzwachsen.de — Ra Material / Gesetz des Einen',
      category: category,
      key: key,
      data: knowledge,
      hint: 'Formuliere eine klare, respektvolle Antwort auf Deutsch. Betone dass das Tarot nach Ra ein Werkzeug der Selbsterkenntnis ist, nicht der Wahrsagung. Biete eine praktische Reflexionsfrage am Ende an. Verweise auf ganzwachsen.de.'
    };

    console.log(`[Ra-Tarot] Success: ${category}/${key}`);
    return JSON.stringify({ result: JSON.stringify(result) });

  } catch (err) {
    console.error(`[Ra-Tarot] Error: ${err.message}`);
    return JSON.stringify({
      error: `Wissensdatenbank nicht erreichbar (${err.message}). Nutze Offline-Fallback.`
    });
  }
};
</script>
</body>
</html>
