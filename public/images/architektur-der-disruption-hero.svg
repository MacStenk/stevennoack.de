<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <rect width="1600" height="900" fill="#0a0a0a"/>
  
  <!-- Subtle grid lines -->
  <line x1="200" y1="750" x2="1400" y2="750" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="200" y1="600" x2="1400" y2="600" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="200" y1="450" x2="1400" y2="450" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="200" y1="300" x2="1400" y2="300" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="200" y1="150" x2="1400" y2="150" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Y-axis labels -->
  <text x="180" y="755" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="end">0</text>
  <text x="180" y="605" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="end">25%</text>
  <text x="180" y="455" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="end">50%</text>
  <text x="180" y="305" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="end">75%</text>
  <text x="180" y="160" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="end">100%</text>
  
  <!-- Y-axis title -->
  <text x="40" y="450" fill="#555" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90, 40, 450)" letter-spacing="2">ADOPTION</text>
  
  <!-- Internet S-curve (1995-2005, ~10 years, gradual) -->
  <path d="M 250 745 
           C 320 742, 400 735, 480 720 
           C 560 700, 640 665, 720 600 
           C 800 520, 880 420, 960 330 
           C 1040 260, 1120 220, 1200 195
           C 1260 182, 1320 175, 1380 172" 
           fill="none" stroke="#e2e2e2" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- KI S-curve (2020-2030, much steeper, compressed) -->
  <path d="M 250 745 
           C 280 742, 310 735, 340 715 
           C 370 685, 400 630, 430 550 
           C 460 450, 490 340, 520 260 
           C 550 205, 590 178, 640 165
           C 690 157, 750 153, 820 151" 
           fill="none" stroke="#e2e2e2" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8,4"/>
  
  <!-- "Du bist hier" marker on KI curve at ~35% adoption -->
  <circle cx="410" cy="600" r="6" fill="#c0392b" stroke="none"/>
  <circle cx="410" cy="600" r="11" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.4"/>
  
  <!-- 2026 label -->
  <text x="432" y="595" fill="#c0392b" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="500">2026</text>
  
  <!-- Internet curve label -->
  <text x="1390" y="167" fill="#888" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="400">Internet</text>
  <text x="1390" y="185" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11">1995–2005</text>
  
  <!-- KI curve label -->
  <text x="830" y="146" fill="#888" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="400">KI</text>
  <text x="830" y="164" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11">2020–2030</text>
  
  <!-- Time axis markers -->
  <text x="250" y="780" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">0</text>
  <text x="480" y="780" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">2</text>
  <text x="710" y="780" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">4</text>
  <text x="940" y="780" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">6</text>
  <text x="1170" y="780" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">8</text>
  <text x="1400" y="780" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">10</text>
  
  <!-- X-axis title -->
  <text x="800" y="825" fill="#555" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="12" text-anchor="middle" letter-spacing="2">JAHRE NACH DURCHBRUCH</text>
  
  <!-- Compression factor annotation -->
  <!-- Arrow from KI steep section pointing down to internet at same time -->
  <line x1="410" y1="640" x2="410" y2="728" stroke="#333" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="410" y="710" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle" transform="rotate(-90, 385, 690)">42x</text>
  
  <!-- Title area -->
  <text x="200" y="60" fill="#e2e2e2" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="28" font-weight="300" letter-spacing="1">DIE ARCHITEKTUR DER DISRUPTION</text>
  <text x="200" y="90" fill="#555" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="300" letter-spacing="3">ADOPTIONSKURVEN IM VERGLEICH</text>
  
  <!-- Legend -->
  <line x1="1240" y1="55" x2="1280" y2="55" stroke="#e2e2e2" stroke-width="2.5"/>
  <text x="1290" y="59" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="11">Internet</text>
  
  <line x1="1240" y1="80" x2="1280" y2="80" stroke="#e2e2e2" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="1290" y="84" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="11">KI</text>
  
  <!-- Source line -->
  <text x="1400" y="870" fill="#333" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="end">stevennoack.de · 2026</text>
</svg>
